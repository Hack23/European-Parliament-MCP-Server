name: Refresh Weekly Corporate Bodies Cache

on:
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
  NPM_CONFIG_FETCH_TIMEOUT: "300000"

jobs:
  refresh-weekly-corporate-bodies-cache:
    runs-on: ubuntu-26.04
    timeout-minutes: 120
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly corporate bodies cache
        run: npm run generate:weekly-cache:corporate-bodies
        env:
          NODE_ENV: production
          EP_REQUEST_TIMEOUT_MS: 120000

      - name: Create pull request with refreshed cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Generated cache files are untracked on a clean checkout, so git diff
          # alone cannot detect the first refresh or newly created weekly files.
          if [ -z "$(git status --porcelain=v1 --untracked-files=all -- data/weekly/corporate-bodies)" ]; then
            echo "No corporate bodies cache changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="automation/weekly-corporate-bodies-cache-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A -- data/weekly/corporate-bodies
          git commit -m "chore: refresh weekly corporate bodies cache [skip ci]"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --title "chore: refresh weekly corporate bodies cache" \
            --body "Automated weekly refresh of corporate bodies cache data from EP Open Data API." \
            --base main \
            --head "$BRANCH"
