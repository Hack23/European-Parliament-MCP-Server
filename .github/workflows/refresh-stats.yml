# Refresh European Parliament Statistics
#
# Fetches live counts from the EP Open Data Portal API, updates the static
# data in src/data/generatedStats.ts, validates both raw data AND computed
# stats (derived intelligence, rankings, predictions, monthly distributions),
# and commits the result when all checks pass.
#
# The EP API does not provide a totalItems header, so records are iterated
# to obtain accurate counts (limit: 1000 per page, the API's server-side cap).
# Client-side counting of downloaded data is trusted.
#
# EP API endpoint strategy:
#   ✅ /meetings (plenary sessions) — server-side `year` filter
#   ✅ /adopted-texts              — server-side `year` filter
#   ✅ /plenary-documents          — server-side `year` filter
#   ✅ /meps-declarations          — server-side `year` filter
#   ✅ /parliamentary-questions    — server-side `year` (via dateFrom)
#   ✅ /speeches                   — server-side `sitting-date`/`sitting-date-end`
#   ✅ /events                     — NO server filter; dates from ID suffix
#                                    (e.g. -DEPOT-2025-03-26); client-side bucketing
#   ✅ /procedures                 — NO server filter; year from `dateInitiated`
#                                    when available, or from procedure references
#                                    (e.g. 2024-0123, 2023/0123(COD));
#                                    client-side bucketing
#   ✅ /external-documents         — NO server filter; date from document_date field;
#                                    client-side bucketing
#   ⏭ /committee-documents        — NO year filter AND no date field; excluded
#
# Endpoints without server-side year filter paginate records and extract
# dates/years client-side.  Pagination may stop early once the target year's
# contiguous block is exhausted, and a safety cap also limits traversal.
#
# Data quality safeguards (--update mode):
#   • Partial fetches (pagination errors mid-stream) are never written back
#   • API values below 10 are rejected when stored value is >5× larger
#   • API values representing >50% drop from substantial stored values
#     (>100 items) are rejected as likely incomplete EP API data
#   • All-zero monthly distributions are not written to RAW_MONTHLY_DATA
#   • Monthly data is gated by the same credibility check as yearly totals
#   • All API calls are sequential to respect EP API rate limits
#
# Scheduled runs use --recent (last 3 years) to stay within timeout limits.
# Manual dispatch supports --all for full dataset refresh, --recent for fast
# refresh, or a specific 4-digit year.
#
# ISMS Policy: AU-002 (Audit Logging), SC-002 (Input Validation)
# Data source: European Parliament Open Data Portal — data.europarl.europa.eu

name: Refresh EP Stats

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to validate (leave empty for recent years, "all" for all years, or a 4-digit year e.g. 2024)'
        required: false
        default: ''
        type: string

# Resilience against transient npm registry / mirror failures.
env:
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
  NPM_CONFIG_FETCH_TIMEOUT: "300000"

jobs:
  refresh-stats:
    name: Update & Validate EP Statistics
    runs-on: ubuntu-26.04
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch API data and update stats
        run: |
          INPUT_YEAR="${STATS_YEAR}"
          # Default: scheduled runs use --recent (last 3 years) to stay within
          # timeout limits. Manual dispatch can specify "all" for a full refresh.
          if [ -z "${INPUT_YEAR}" ]; then
            ARGS="--recent --update"
          elif [ "${INPUT_YEAR}" = "all" ]; then
            ARGS="--all --update"
          elif [ "${INPUT_YEAR}" = "recent" ]; then
            ARGS="--recent --update"
          elif [[ "${INPUT_YEAR}" =~ ^[0-9]{4}$ ]]; then
            ARGS="--year ${INPUT_YEAR} --update"
          else
            echo "Error: Invalid year input '${INPUT_YEAR}'. Must be 'all', 'recent', or a 4-digit year (e.g. 2024)." >&2
            exit 1
          fi
          echo "Running: npx tsx scripts/generate-stats.ts $ARGS"
          npx tsx scripts/generate-stats.ts $ARGS
        env:
          NODE_ENV: production
          STATS_YEAR: ${{ github.event.inputs.year }}

      - name: Validate data integrity and computed stats
        run: npx vitest run src/data/generatedStats.test.ts --reporter=verbose

      - name: Type-check updated stats
        run: npx tsc --noEmit

      - name: Create pull request with updated stats
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src/data/generatedStats.ts; then
            echo "No stats changes detected."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            BRANCH="automation/refresh-ep-stats-$(date -u +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add src/data/generatedStats.ts
            git commit -m "chore: refresh EP stats from live API data [skip ci]"
            git push --set-upstream origin "$BRANCH"
            gh pr create \
              --title "chore: refresh EP stats from live API data" \
              --body "Automated refresh of precomputed generated statistics using live EP API verification." \
              --base main \
              --head "$BRANCH"
          fi
