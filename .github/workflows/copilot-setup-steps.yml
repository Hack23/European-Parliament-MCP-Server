name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/copilot-mcp.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/copilot-mcp.json

env:
  GITHUB_TOKEN: ${{ secrets.COPILOT_MCP_GITHUB_PERSONAL_ACCESS_TOKEN }}
  GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.COPILOT_MCP_GITHUB_PERSONAL_ACCESS_TOKEN }}

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      contents: read
      actions: read
      attestations: read
      checks: read
      deployments: read
      issues: write
      models: read
      discussions: read
      pages: read
      pull-requests: write
      security-events: read
      statuses: read

    # Steps run before the agent starts working
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Cache APT packages for faster installs
      - name: Cache APT packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/copilot-setup-steps.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      # JavaScript/TypeScript setup
      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
  
      - name: Cache dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install packages 
        run: |
          npm ci

      # Build the European Parliament MCP Server and link globally so it's available as a local MCP server
      - name: Build European Parliament MCP Server
        run: |
          echo "🔨 Building European Parliament MCP Server..."
          npm run build
          npm link
          echo "✅ MCP Server built and linked as 'european-parliament-mcp-server'"

      # Cache global npm packages for MCP servers (restore before installs to avoid stale overwrites)
      - name: Cache global npm packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            /usr/local/lib/node_modules
            /usr/local/bin/mcp-server-*
            /usr/local/bin/playwright-mcp
          key: ${{ runner.os }}-mcp-servers-v6-${{ hashFiles('.github/copilot-mcp.json') }}
          restore-keys: |
            ${{ runner.os }}-mcp-servers-v6-

      # Pre-install MCP server packages globally
      - name: Install MCP server packages globally
        run: |
          echo "📦 Installing MCP server packages globally..."
          
          # Install Node.js MCP servers that exist on npm
          npm install -g @modelcontextprotocol/server-filesystem
          npm install -g @modelcontextprotocol/server-memory
          npm install -g @modelcontextprotocol/server-sequential-thinking
          
          # Install @playwright/mcp for browser automation
          npm install -g @playwright/mcp
                    
          echo "✅ Node.js MCP server packages installed globally"

      # Verify all MCP server installations
      - name: Verify MCP server installations
        run: |
          echo "🔍 Verifying MCP server installations..."
          
          echo "=== European Parliament MCP Server ==="
          european-parliament-mcp-server --version
          echo "✅ european-parliament-mcp-server verified"
          
          echo ""
          echo "=== Node.js MCP Servers ==="
          echo "Checking mcp-server-filesystem..."
          which mcp-server-filesystem && echo "✅ mcp-server-filesystem found" || echo "❌ mcp-server-filesystem NOT found"
          
          echo "Checking mcp-server-memory..."
          which mcp-server-memory && echo "✅ mcp-server-memory found" || echo "❌ mcp-server-memory NOT found"
          
          echo "Checking mcp-server-sequential-thinking..."
          which mcp-server-sequential-thinking && echo "✅ mcp-server-sequential-thinking found" || echo "❌ mcp-server-sequential-thinking NOT found"
          
          echo "Checking playwright-mcp..."
          which playwright-mcp && echo "✅ playwright-mcp found" || echo "❌ playwright-mcp NOT found"
                              
          echo ""
          echo "=== HTTP MCP Servers ==="
          echo "📍 GitHub MCP Server: Using HTTP endpoint (https://api.githubcopilot.com/mcp/insiders)"
          echo "✅ MCP server verification complete"
