name: Refresh Weekly MEP Cache

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of MEPs requested per listing page and detail profiles refreshed this run'
        required: false
        default: '250'
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-weekly-meps-cache
  cancel-in-progress: false

env:
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
  NPM_CONFIG_FETCH_TIMEOUT: "300000"

jobs:
  refresh-weekly-meps-cache:
    runs-on: ubuntu-26.04
    timeout-minutes: 120
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore current weekly MEP cache state
        run: |
          set -euo pipefail
          STATE_BRANCH="automation/weekly-meps-cache-state"
          mkdir -p data/weekly/meps
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH:refs/remotes/origin/$STATE_BRANCH"
            if git cat-file -e "origin/$STATE_BRANCH:data/weekly/meps/latest.json" 2>/dev/null; then
              git show "origin/$STATE_BRANCH:data/weekly/meps/latest.json" > data/weekly/meps/latest.json
              echo "Restored in-progress weekly MEP cache baseline from $STATE_BRANCH."
            fi
          elif [ -f data/weekly/meps/latest.json ]; then
            echo "Using weekly MEP cache baseline checked out from main."
          else
            echo "No existing weekly MEP cache baseline found."
          fi

      - name: Generate weekly MEP cache
        run: |
          set -euo pipefail
          BATCH_SIZE="${MEP_BATCH_SIZE:-250}"
          if ! [[ "$BATCH_SIZE" =~ ^[0-9]+$ ]] || [ "$BATCH_SIZE" -lt 1 ]; then
            echo "Invalid batch size '$BATCH_SIZE' (must be a positive integer)." >&2
            exit 1
          fi
          npm run generate:weekly-cache:meps -- --batch-size "$BATCH_SIZE"
        env:
          NODE_ENV: production
          MEP_BATCH_SIZE: ${{ github.event.inputs.batch_size }}

      - name: Report MEP cache progress
        run: |
          set -euo pipefail
          node -e '
            const fs = require("node:fs");
            const p = "data/weekly/meps/latest.json";
            if (!fs.existsSync(p)) {
              console.log("No weekly cache file generated.");
              process.exit(0);
            }
            const data = JSON.parse(fs.readFileSync(p, "utf8"));
            const progress = data.progress ?? {};
            const meps = Array.isArray(data.meps) ? data.meps.length : 0;
            const remaining = typeof progress.remainingDetails === "number" ? progress.remainingDetails : "unknown";
            const fetchedInRun = typeof progress.fetchedInRun === "number" ? progress.fetchedInRun : "unknown";
            const failedInRun = typeof progress.failedInRun === "number" ? progress.failedInRun : "unknown";
            const complete = progress.complete === true ? "yes" : "no";
            console.log(`MEP cache progress: total=${meps}, fetchedInRun=${fetchedInRun}, failedInRun=${failedInRun}, remaining=${remaining}, complete=${complete}`);
          '

      - name: Create pull request with refreshed cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Generated cache files are untracked on a clean checkout, so git diff
          # alone cannot detect the first refresh or newly created weekly files.
          if [ -z "$(git status --porcelain=v1 --untracked-files=all -- data/weekly/meps)" ]; then
            echo "No MEP cache changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          STATE_BRANCH="automation/weekly-meps-cache-state"
          SUCCESS_BRANCH="automation/weekly-meps-cache-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git add -A -- data/weekly/meps
          if git diff --cached --quiet; then
            echo "No staged MEP cache changes detected."
            exit 0
          fi
          git commit -m "chore: refresh weekly MEP cache [skip ci]"
          git push --force-with-lease origin "HEAD:$STATE_BRANCH"
          git push --force-with-lease origin "HEAD:$SUCCESS_BRANCH"

          PR_NUMBER=$(gh pr list --head "$SUCCESS_BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "PR for $SUCCESS_BRANCH already exists (#$PR_NUMBER); updated branch with latest cache progress."
          else
            gh pr create \
              --title "chore: refresh weekly MEP cache" \
              --body "Automated weekly refresh of MEP list and incremental MEP detail cache data from EP Open Data API." \
              --base main \
              --head "$SUCCESS_BRANCH"
          fi
