name: SLSA Provenance and Attestations

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  actions: read

jobs:
  build:
    name: Build and Attest
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package for distribution
        run: |
          # Create tarball of dist directory
          tar -czf european-parliament-mcp-server.tar.gz -C dist .
          
          # Create npm package
          npm pack
          
          # Create source tarball
          git archive --format=tar.gz --prefix=european-parliament-mcp-server/ HEAD > source.tar.gz

      - name: Generate artifact hashes
        id: hash
        run: |
          # Generate SHA256 hashes for all artifacts
          sha256sum european-parliament-mcp-server.tar.gz > checksums.txt
          sha256sum european-parliament-mcp-server-*.tgz >> checksums.txt
          sha256sum source.tar.gz >> checksums.txt
          
          # Export hashes for provenance
          echo "hashes=$(sha256sum european-parliament-mcp-server.tar.gz european-parliament-mcp-server-*.tgz source.tar.gz | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Attest build artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.0.1
        with:
          subject-path: |
            european-parliament-mcp-server.tar.gz
            european-parliament-mcp-server-*.tgz
            source.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.2
        with:
          name: build-artifacts
          path: |
            european-parliament-mcp-server.tar.gz
            european-parliament-mcp-server-*.tgz
            source.tar.gz
            checksums.txt

      - name: Attach artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.2.1
        with:
          files: |
            european-parliament-mcp-server.tar.gz
            european-parliament-mcp-server-*.tgz
            source.tar.gz
            checksums.txt

  provenance:
    name: Generate SLSA Provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
      attestations: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      # Only upload to release when triggered by release event
      upload-assets: ${{ github.event_name == 'release' }}
      # Only set tag name for release events; empty string for other triggers
      upload-tag-name: ${{ github.event_name == 'release' && github.ref_name || '' }}
      provenance-name: "provenance.intoto.jsonl"

  verify:
    name: Verify Attestations
    needs: [build, provenance]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts

      - name: Verify build attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Verify each artifact
          for artifact in european-parliament-mcp-server.tar.gz european-parliament-mcp-server-*.tgz source.tar.gz; do
            echo "🔍 Verifying attestation for: $artifact"
            gh attestation verify "$artifact" \
              --owner Hack23 \
              --repo European-Parliament-MCP-Server || {
              echo "❌ Attestation verification failed for $artifact"
              exit 1
            }
            echo "✅ Attestation verified for $artifact"
          done

      - name: Verify checksums
        run: |
          echo "🔍 Verifying checksums..."
          sha256sum -c checksums.txt || {
            echo "❌ Checksum verification failed"
            exit 1
          }
          echo "✅ All checksums verified"

  publish-npm:
    name: Publish to npm
    needs: [build, provenance, verify]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts

      - name: Publish to npm with provenance
        run: |
          npm publish european-parliament-mcp-server-*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
